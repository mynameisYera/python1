# Blueprint Render: подключите репозиторий и при необходимости добавьте PostgreSQL как ресурс.
# В панели укажите те же переменные, что и для Railway (см. ответ в чате).

services:
  - type: web
    name: python1-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DJANGO_DEBUG
        value: "False"
      # Задайте в UI: DJANGO_SECRET_KEY, DJANGO_ALLOWED_HOSTS, DATABASE_URL (из PostgreSQL-аддона)
